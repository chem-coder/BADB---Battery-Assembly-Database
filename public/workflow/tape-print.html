<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Печатный отчёт по ленте</title>
    <link rel="stylesheet" type="text/css" href="/css/styles.css">
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #fff;
        color: #222;
      }

      .print_report {
        max-width: 820px;
        margin: 0 auto;
        padding: 18px 22px 36px;
      }

      .report_actions {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
      }

      .report_title {
        margin: 0 0 2px;
        font-size: 14px;
        font-weight: 600;
        color: #666;
        letter-spacing: 0.02em;
      }

      .report_subtitle {
        margin: 0 0 10px;
        font-size: 28px;
        font-weight: 700;
        color: #222;
      }

      .report_meta {
        margin: 0 0 18px;
        color: #444;
        font-size: 13px;
      }

      .report_section {
        margin-top: 18px;
        page-break-inside: avoid;
      }

      .report_section h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .report_subsection {
        margin-top: 16px;
      }

      .report_subsection h3 {
        margin: 0 0 8px;
        font-size: 17px;
        font-weight: 650;
      }

      .report_row {
        margin: 2px 0;
        line-height: 1.35;
      }

      .process_step {
        margin-top: 18px;
      }

      .process_step_body {
        margin-left: 2px;
      }

      .step_line {
        margin: 2px 0;
        line-height: 1.45;
        color: #222;
        font-weight: 400;
      }

      .step_operator {
        margin-bottom: 6px;
      }

      .step_spacer {
        height: 8px;
      }

      .step_meta_row {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 8px;
        align-items: start;
        margin: 3px 0;
        line-height: 1.45;
      }

      .step_meta_label {
        color: #555;
        font-weight: 500;
      }

      .step_meta_value {
        color: #222;
        font-weight: 400;
      }

      .step_timing_row {
        margin-top: 8px;
      }

      .report_table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 6px;
        font-size: 13px;
      }

      .report_table th,
      .report_table td {
        border: 1px solid #cfcfcf;
        padding: 5px 7px;
        text-align: left;
        vertical-align: top;
      }

      .report_table th {
        background: #f7f7f7;
      }

      .muted {
        color: #666;
      }

      @media print {
        .report_actions {
          display: none;
        }

        .print_report {
          max-width: none;
          padding: 0;
        }

        a {
          color: inherit;
          text-decoration: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="print_report">
      <div class="report_actions">
        <button type="button" id="printReportBtn">Печать</button>
        <button type="button" id="closeReportBtn">Закрыть</button>
      </div>

      <div id="reportRoot">
        <p class="muted">Загрузка отчёта…</p>
      </div>
    </main>

    <script src="/js/tape-print.js"></script>
  </body>
</html>
